name: Build Linux Executable

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --onefile --name suapcp app.py

      - name: Rename executable
        run: mv dist/suapcp dist/suapcp-${{ github.event.inputs.version }}-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suapcp-linux
          path: dist/suapcp-${{ github.event.inputs.version }}-linux

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: suapcp-linux
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }} (Linux)
          draft: true
          prerelease: false
          body: |
            Build manual do SUAP-CP para Linux.
            - Versão: ${{ github.event.inputs.version }}
            - Conferência de patrimônio via leitura de código de barras.
          files: |
            artifacts/suapcp-${{ github.event.inputs.version }}-linux
